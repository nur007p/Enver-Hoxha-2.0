name: Auto Facebook Post

on:
  schedule:
    - cron: '0 */2 * * *' # এটি প্রতি ২ ঘণ্টা অন্তর রান হবে (যেমন: ১২টা, ২টা, ৪টা ইত্যাদি)
  workflow_dispatch: {}    # ম্যানুয়ালি টেস্ট রান করার জন্য

jobs:
  post:
    runs-on: ubuntu-latest
    concurrency:
      group: facebook-autopost
      cancel-in-progress: true 
    
    timeout-minutes: 15 
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi

      - name: Generate image, caption & post to Facebook
        env:
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python post_to_facebook.py
