name: Auto Facebook Post

on:
  schedule:
    - cron: '*/30 * * * *' # প্রতি ৩০ মিনিট অন্তর রান হবে
  workflow_dispatch: {}    # ম্যানুয়ালি টেস্ট রান করার জন্য

jobs:
  post:
    runs-on: ubuntu-latest
    concurrency:
      group: facebook-autopost
      cancel-in-progress: true 
    
    timeout-minutes: 15 
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          python -m pip install --upgrade pip
          # ফাইলটি চেক করে ইন্সটল করবে
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi
          # অতিরিক্ত নিশ্চয়তার জন্য moviepy ইন্সটল করা
          python -m pip install moviepy==1.0.3

      - name: Generate image, caption & post to Facebook
        env:
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python post_to_facebook.py
