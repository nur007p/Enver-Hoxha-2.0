name: Auto Facebook Post

on:
  schedule:
    - cron: '*/30 * * * *' # প্রতি ৩০ মিনিট অন্তর রান হবে
  workflow_dispatch: {}    # ম্যানুয়ালি টেস্ট রান করার জন্য

jobs:
  post:
    runs-on: ubuntu-latest
    concurrency:
      group: facebook-autopost
      cancel-in-progress: true # আগের রান অসম্পূর্ণ থাকলে নতুনটি শুরু হওয়ার সময় আগেরটি বাতিল হবে
    
    timeout-minutes: 15 # রান ১৫ মিনিটের বেশি সময় নিলে অটোমেটিক বন্ধ হয়ে যাবে
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate image, caption & post to Facebook
        env:
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          # যদি স্টাইল বা প্রোভাইডার সেট করতে চান, তবে এখানে সিক্রেট যোগ করবেন
        run: python post_to_facebook.py
