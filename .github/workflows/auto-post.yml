name: Auto Facebook Post

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch: {}

jobs:
  post:
    runs-on: ubuntu-latest
    concurrency:
      group: facebook-autopost
      cancel-in-progress: true 
    
    timeout-minutes: 15 
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # নিশ্চিত করুন যে requirements.txt এ google-genai, requests, pillow আছে
          pip install google-genai requests pillow

      - name: Generate image, caption & post to Facebook
        env:
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}  # এখানে HF_TOKEN এর বদলে এটি দিন
        run: python post_to_facebook.py
